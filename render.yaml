services:
  - type: web
    name: fitbuddy-app
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn my_website.wsgi
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: my_website.settings
      - key: PYTHON_VERSION
        value: 3.12.0