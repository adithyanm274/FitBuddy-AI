services:
  - type: web
    name: fitbuddy-app
    env: python
    buildCommand: |
      apt-get update && apt-get install -y libopenblas-dev gfortran
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn my_website.wsgi:application --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 2
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: my_website.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: WEB_CONCURRENCY
        value: 1