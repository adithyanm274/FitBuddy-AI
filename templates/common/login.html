<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - FitBuddy AI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(at center, #1a202c, #000000); /* Subtle dark gradient */
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent scrollbars */
        }
        .btn-login {
            position: relative;
            overflow: hidden;
            z-index: 1; /* Ensure content is above ::before */
        }
        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease-out, height 0.4s ease-out;
            z-index: 0;
        }
        .btn-login:hover::before {
            width: 150%;
            height: 150%;
        }
        .btn-login span {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="login-container bg-gray-800 p-8 rounded-2xl w-full max-w-sm shadow-2xl border border-gray-700
                  transform transition duration-500 hover:scale-105">
        <h2 class="text-3xl font-bold text-center mb-8 text-green-400 flex items-center justify-center space-x-3">
            <i class="fas fa-lock text-green-400"></i>
            <span>Login</span>
        </h2>

        <form method="post" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="error-msg bg-red-900 text-red-300 p-3 rounded-lg text-center text-sm flex items-center justify-center space-x-2">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            <div>
                <label for="username" class="block text-gray-300 text-sm font-medium mb-2">
                    <i class="fas fa-user mr-2 text-green-400"></i>Username
                </label>
                <input type="text" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                       name="username" id="username" placeholder="Enter your username" required>
            </div>

            <div>
                <label for="password" class="block text-gray-300 text-sm font-medium mb-2">
                    <i class="fas fa-key mr-2 text-green-400"></i>Password
                </label>
                <input type="password" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                       name="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-full shadow-lg
                                         transition duration-300 transform hover:scale-105 active:scale-95 w-full flex items-center justify-center space-x-3">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login</span>
            </button>
        </form>

        <a href="{% url 'landing_page' %}"
           class="back-link block mt-6 text-center text-gray-400 hover:text-white transition duration-300 flex items-center justify-center space-x-2">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </div>

</body>
</html>
