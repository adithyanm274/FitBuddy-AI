<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Body Register - FitBuddy AI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(at top right, #1a202c, #000000); /* Subtle dark gradient */
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }
        .btn-submit {
            position: relative;
            overflow: hidden;
            z-index: 1; /* Ensure content is above ::before */
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease-out, height 0.4s ease-out;
            z-index: 0;
        }
        .btn-submit:hover::before {
            width: 150%;
            height: 150%;
        }
        .btn-submit span {
            position: relative;
            z-index: 1;
        }

        /* Custom styling for select dropdown arrow to ensure it's visible on dark background */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M7 8l3 3 3-3'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="register-container bg-gray-800 p-8 rounded-2xl w-full max-w-2xl shadow-2xl border border-gray-700
                  transform transition duration-500 hover:scale-105">
        <h2 class="text-3xl font-bold text-center mb-8 text-green-400 flex items-center justify-center space-x-3">
            <i class="fas fa-user-plus text-green-400"></i>
            <span>Body Register</span>
        </h2>

        <!-- Body Register Form -->
        <form method="post" action="{% url 'register_user' %}" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Row 1: Full Name & Age -->
                <div>
                    <label for="username" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-user mr-2 text-green-400"></i>Full Name
                    </label>
                    <input type="text" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                           id="username" name="username" placeholder="Enter your full name" required>
                </div>
                <div>
                    <label for="age" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-calendar-alt mr-2 text-green-400"></i>Age
                    </label>
                    <input type="number" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                           id="age" name="age" placeholder="Enter your age" required>
                </div>

                <!-- Row 2: Gender & Height -->
                <div class="relative">
                    <label for="gender" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-venus-mars mr-2 text-green-400"></i>Gender
                    </label>
                    <select class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200 appearance-none"
                            id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div>
                    <label for="height" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-ruler-vertical mr-2 text-green-400"></i>Height (cm)
                    </label>
                    <input type="number" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                           id="height" name="height" placeholder="Enter your height" required>
                </div>

                <!-- Row 3: Weight & Fitness Goal -->
                <div>
                    <label for="weight" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-weight mr-2 text-green-400"></i>Weight (kg)
                    </label>
                    <input type="number" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                           id="weight" name="weight" placeholder="Enter your weight" required>
                </div>
                <div class="relative">
                    <label for="goal" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-crosshairs mr-2 text-green-400"></i>Fitness Goal
                    </label>
                    <select class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200 appearance-none"
                            id="goal" name="goal" required>
                        <option value="">Select Goal</option>
                        <option value="weight_loss">Weight Loss</option>
                        <option value="muscle_gain">Muscle Gain</option>
                        <option value="maintain">Maintain Fitness</option>
                    </select>
                </div>

                <!-- Row 4: Activity Level & Password -->
                <div class="relative">
                    <label for="activity_level" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-running mr-2 text-green-400"></i>Activity Level
                    </label>
                    <select class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200 appearance-none"
                            id="activity_level" name="activity_level" required>
                        <option value="">Select Activity Level</option>
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div>
                    <label for="password" class="block text-gray-300 text-sm font-medium mb-2">
                        <i class="fas fa-key mr-2 text-green-400"></i>Password
                    </label>
                    <input type="password" class="w-full px-5 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
                           id="password" name="password" placeholder="Enter a secure password" required>
                </div>
            </div>
            
            <button type="submit" class="btn-submit bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-8 rounded-full shadow-lg
                                         transition duration-300 transform hover:scale-105 active:scale-95 w-full flex items-center justify-center space-x-3 mt-8">
                <i class="fas fa-user-check"></i>
                <span>Register</span>
            </button>

        </form>

        <a href="{% url 'landing_page' %}"
           class="back-link block mt-6 text-center text-gray-400 hover:text-white transition duration-300 flex items-center justify-center space-x-2">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </div>

</body>
</html>
