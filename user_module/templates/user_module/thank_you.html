<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Feedback - FitBuddy AI</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    {% load static %}
    <style>
        /* Custom styles for body background and overall layout */
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(at top center, #1a202c, #000000); /* Subtle dark gradient */
            background-attachment: fixed;
            overflow-x: hidden; /* Prevent horizontal scroll on small screens */
            color: #edf2f7; /* Default text color, mimicking Tailwind's gray-200 */
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensure body takes full viewport height */
        }

        /* Custom colors to mimic Tailwind's palette where Bootstrap defaults don't match */
        .bg-gray-800-custom {
            background-color: #2d3748 !important; /* Tailwind gray-800 */
        }
        .bg-gray-700-custom {
            background-color: #4a5568 !important; /* Tailwind gray-700 */
        }
        .bg-gray-900-custom {
            background-color: #1a202c !important; /* Tailwind gray-900 */
        }
        .text-green-400-custom {
            color: #68d391 !important; /* Tailwind green-400 */
        }
        .text-gray-300-custom {
            color: #cbd5e0 !important; /* Tailwind gray-300 */
        }
        .border-gray-700-custom {
            border-color: #4a5568 !important; /* Tailwind gray-700 */
        }

        /* Navbar specific styling */
        .navbar-custom {
            background-color: #2d3748 !important; /* Tailwind gray-800 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Tailwind shadow-lg equivalent */
            border-bottom-left-radius: 0.5rem; /* rounded-b-lg */
            border-bottom-right-radius: 0.5rem; /* rounded-b-lg */
        }
        .navbar-brand-custom {
            font-size: 1.25rem; /* text-xl */
            font-weight: 700; /* font-bold */
        }
        .nav-link-active-custom {
            background-color: #38a169 !important; /* Tailwind green-600 */
            color: #fff !important;
            padding: 0.5rem 1rem; /* px-4 py-2 */
            border-radius: 9999px; /* rounded-full */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* shadow-md */
        }
        .nav-link-active-custom:hover {
            background-color: #2f855a !important; /* Tailwind green-700 */
        }
        .hover-text-green-400-custom:hover {
            color: #68d391 !important;
        }
        .hover-text-white-custom:hover {
            color: #fff !important;
        }

        /* Main content padding-top to clear fixed navbar */
        .main-content-padding-top {
            padding-top: 4.5rem !important; /* Adjust based on navbar height */
        }

        /* Feedback container styling */
        .feedback-container {
            max-width: 576px; /* Equivalent to Tailwind's max-w-lg */
        }

        /* Submit button ripple effect */
        .submit-btn {
            position: relative;
            overflow: hidden;
            z-index: 1; /* Ensure content is above ::before */
            transition: background-color 0.3s ease-in-out, transform 0.2s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease-out, height 0.4s ease-out;
            z-index: 0;
        }
        .submit-btn:hover::before {
            width: 150%;
            height: 150%;
        }
        .submit-btn span {
            position: relative;
            z-index: 1;
        }
        .submit-btn:hover {
            transform: scale(1.05); /* hover:scale-105 */
        }
        .submit-btn:active {
            transform: scale(0.95); /* active:scale-95 */
        }

        /* Offcanvas custom styling */
        .offcanvas-custom {
            background-color: #2d3748 !important; /* Tailwind gray-800 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* Tailwind shadow-xl */
        }
        .offcanvas-backdrop-custom {
            background-color: rgba(0, 0, 0, 0.75); /* bg-black bg-opacity-75 */
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 767.98px) {
            .navbar-brand-custom {
                font-size: 1.125rem; /* Smaller logo on mobile */
            }
        }
    </style>
</head>
<body class="bg-gray-900-custom text-white min-vh-100 d-flex flex-column">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark fixed-top navbar-custom">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center me-auto navbar-brand-custom hover-text-green-400-custom" href="#">
                <i class="fas fa-comment text-green-400-custom me-2"></i>
                <span>FitBuddy AI</span>
            </a>
            <div class="d-none d-md-flex gap-4">
                <ul class="navbar-nav flex-row align-items-center gap-4">
                    <li class="nav-item">
                        <a class="nav-link nav-link-active-custom d-flex align-items-center" href="{% url 'feedback' %}"><i class="fas fa-comment me-2"></i> <span>Feedback</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center text-gray-300-custom hover-text-white-custom" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-2"></i> <span>Logout</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center text-gray-300-custom hover-text-white-custom" href="{% url 'food_recommender' %}"><i class="fas fa-utensils me-2"></i> <span>Food Recommender</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center text-gray-300-custom hover-text-white-custom" href="{% url 'user_home' %}"><i class="fas fa-robot me-2"></i> <span>Chatbot</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center text-gray-300-custom hover-text-white-custom" href="{% url 'exercise_recommender' %}"><i class="fas fa-running me-2"></i> <span>Exercise</span></a>
                    </li>
                </ul>
            </div>
            <button class="navbar-toggler d-md-none text-gray-300-custom" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu (Offcanvas) -->
    <div class="offcanvas offcanvas-end text-white offcanvas-custom" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 gap-3">
                <li class="nav-item">
                    <a class="nav-link nav-link-active-custom d-flex align-items-center fs-5" href="{% url 'feedback' %}"><i class="fas fa-comment me-3"></i> <span>Feedback</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center fs-5 text-gray-300-custom hover-text-white-custom" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-3"></i> <span>Logout</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center fs-5 text-gray-300-custom hover-text-white-custom" href="{% url 'food_recommender' %}"><i class="fas fa-utensils me-3"></i> <span>Food Recommender</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center fs-5 text-gray-300-custom hover-text-white-custom" href="{% url 'user_home' %}"><i class="fas fa-robot me-3"></i> <span>Chatbot</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center fs-5 text-gray-300-custom hover-text-white-custom" href="{% url 'exercise_recommender' %}"><i class="fas fa-running me-3"></i> <span>Exercise</span></a>
                </li>
            </ul>
        </div>
    </div>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4 p-md-5 main-content-padding-top">
        <div class="feedback-container bg-gray-800-custom p-5 rounded-4 shadow-lg border border-gray-700-custom w-100 text-center">
            <h2 class="fs-2 fw-bold mb-4 text-green-400-custom d-flex align-items-center justify-content-center gap-3">
                <i class="fas fa-check-circle text-green-400-custom"></i>
                <span>Thank You for your feedback!</span>
            </h2>
            <a href="{% url 'user_home' %}"
               class="btn btn-success mt-4 px-5 py-3 rounded-pill shadow-lg submit-btn d-inline-flex align-items-center justify-content-center gap-2">
                <i class="fas fa-home"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </div>

    <!-- Bootstrap JS CDN (Bundle with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Bootstrap's Offcanvas handles the mobile menu logic automatically
            // with data-bs-toggle and data-bs-target attributes on the button.
            // No custom JS needed for opening/closing the mobile menu here.
        });
    </script>
</body>
</html>
